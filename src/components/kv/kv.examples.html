<!-- @example Simple text value -->
<ce-kv key="Model">chat-deep</ce-kv>

<!-- @example Link value -->
<ce-kv key="Docs"><a href="https://example.com">Reference guide</a></ce-kv>

<!-- @example Status chip -->
<ce-kv key="Status"><ce-chip type="green" dot>Live</ce-chip></ce-kv>

<ce-kv key="MRR"><strong>$12 480</strong> <ce-chip type="green">+18%</ce-chip></ce-kv>

<!-- @example Date with semantic time element -->
<ce-kv key="Updated"><time datetime="2026-05-18">May 18, 2026</time></ce-kv>

<!-- @example Phone with tel link -->
<ce-kv key="Phone"><a href="tel:+79991234567">+7 999 123-45-67</a></ce-kv>
