<!-- @example Static checklist (no localStorage, no events) -->
<ce-checklist items='[{"id":"a","text":"TLS 1.3","checked":true},{"id":"b","text":"SAML SSO"}]'></ce-checklist>

<!-- @example Slot mode — items as ce-check-item children (CDR-005) -->
<ce-checklist>
  <ce-check-item id="tls" checked>TLS 1.3 enforced <a href="#42">#42</a></ce-check-item>
  <ce-check-item id="saml">SAML SSO configured</ce-check-item>
  <ce-check-item id="audit">Security audit passed</ce-check-item>
</ce-checklist>

<!-- @example Grouped by category (group-by="category") -->
<ce-checklist group-by="category">
  <ce-check-item id="tls2" category="Security" checked>TLS 1.3 enforced</ce-check-item>
  <ce-check-item id="saml2" category="Security">SAML SSO configured</ce-check-item>
  <ce-check-item id="profile" category="Onboarding">Complete profile</ce-check-item>
  <ce-check-item id="team" category="Onboarding">Invite team</ce-check-item>
  <ce-check-item id="deploy" category="Onboarding">Deploy first project</ce-check-item>
</ce-checklist>

<!-- @example Editable list — inline add input -->
<ce-checklist
  allow-edit
  items='[
    {"id":"buy","text":"Buy oat milk"},
    {"id":"call","text":"Call the dentist"}
  ]'
></ce-checklist>

<!-- @example Persisted across reloads via localStorage -->
<ce-checklist
  persist-key="onboarding-v1"
  allow-edit
  items='[
    {"id":"profile2","text":"Complete profile"},
    {"id":"team2","text":"Invite team"},
    {"id":"deploy2","text":"Deploy first project"}
  ]'
></ce-checklist>

<!-- @example Empty state with edit-mode — start from scratch -->
<ce-checklist allow-edit></ce-checklist>
