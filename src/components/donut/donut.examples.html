<!-- @example Default — just data; legend auto-renders when ≥ 2 segments (CDR-007) -->
<ce-donut
  values="[42,28,18,12]"
  labels='["Direct","Search","Referral","Social"]'
></ce-donut>

<!-- @example Single segment — legend auto-hides (no redundancy) -->
<ce-donut values="[100]" labels='["Complete"]' center-label="100%"></ce-donut>

<!-- @example Pie variant — thickness 0 -->
<ce-donut
  values="[55,30,15]"
  labels='["Free","Pro","Team"]'
  thickness="0"
></ce-donut>

<!-- @example Custom palette — semantic ok / warn / bad split -->
<ce-donut
  values="[72,18,10]"
  labels='["Healthy","Warning","Failing"]'
  colors='["var(--ce-color-green)","var(--ce-color-amber)","var(--ce-color-red)"]'
  center-label="Services"
></ce-donut>

<!-- @example Rich center via slot — big number + label -->
<ce-donut values="[68,32]" colors='["var(--ce-color-blue)","var(--ce-surface-2)"]' size="160" thickness="14">
  <div slot="center" style="text-align:center">
    <div style="font-size:var(--ce-text-xl);font-weight:600">68%</div>
    <div style="font-size:var(--ce-text-xs);color:var(--ce-muted)">complete</div>
  </div>
</ce-donut>

<!-- @example Custom legend via slot (per-instance escape hatch per CDR-003) -->
<ce-donut values="[42,28,18,12]" labels='["Direct","Search","Referral","Social"]'>
  <aside slot="legend" style="margin-top:var(--ce-space-3);font-size:var(--ce-text-sm);color:var(--ce-muted)">
    Source: GA4, last 30 days. <a href="#breakdown">Full breakdown</a>.
  </aside>
</ce-donut>
