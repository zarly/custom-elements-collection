<!-- @example Unified diff with a language pill -->
<ce-diff
  language="typescript"
  before="export function add(a: number, b: number) {
  return a + b;
}"
  after="export function add(a: number, b: number): number {
  if (Number.isNaN(a) || Number.isNaN(b)) return 0;
  return a + b;
}"
></ce-diff>

<!-- @example Split layout — side-by-side -->
<ce-diff

}'

  <template slot="after">## Roadmap

</template>
</ce-diff>
