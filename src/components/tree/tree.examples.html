<!-- @example File-system tree (slot children, depth-1 expanded by default) -->
<ce-tree default-expanded="depth-1">
  <ce-tree-node label="src">
    <ce-tree-node label="components">
      <ce-tree-node label="button"></ce-tree-node>
      <ce-tree-node label="card"></ce-tree-node>
      <ce-tree-node label="tree"></ce-tree-node>
    </ce-tree-node>
    <ce-tree-node label="core">
      <ce-tree-node label="base.ts"></ce-tree-node>
      <ce-tree-node label="json-prop.ts"></ce-tree-node>
    </ce-tree-node>
    <ce-tree-node label="meta">
      <ce-tree-node label="schema.ts"></ce-tree-node>
    </ce-tree-node>
  </ce-tree-node>
  <ce-tree-node label="docs">
    <ce-tree-node label="adr"></ce-tree-node>
    <ce-tree-node label="cdr"></ce-tree-node>
  </ce-tree-node>
  <ce-tree-node label="dist"></ce-tree-node>
  <ce-tree-node label="package.json"></ce-tree-node>
</ce-tree>

<!-- @example JSON data tree with connector lines -->
<ce-tree
  lines
  default-expanded="all"
  data='[{"label":"Root","children":[{"label":"Child A","children":[{"label":"Leaf 1"},{"label":"Leaf 2"}]},{"label":"Child B","children":[{"label":"Leaf 3"}]},{"label":"Child C"}]}]'
></ce-tree>
