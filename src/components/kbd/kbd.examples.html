<!-- @example Single key -->
<p>Press <ce-kbd>Esc</ce-kbd> to close.</p>

<!-- @example Chord, plus-separated -->
<p>Open the command palette with <ce-kbd>⌘</ce-kbd>+<ce-kbd>K</ce-kbd>.</p>

<!-- @example Three-key combo -->
<p>Force quit with <ce-kbd>⌘</ce-kbd>+<ce-kbd>⌥</ce-kbd>+<ce-kbd>Esc</ce-kbd>.</p>

<!-- @example Glyphs vs words -->
<div style="display:flex;gap:var(--ce-space-3);flex-wrap:wrap">
  <ce-kbd>⌘</ce-kbd>
  <ce-kbd>⇧</ce-kbd>
  <ce-kbd>⌥</ce-kbd>
  <ce-kbd>⌃</ce-kbd>
  <ce-kbd>↵</ce-kbd>
  <ce-kbd>Shift</ce-kbd>
  <ce-kbd>Enter</ce-kbd>
  <ce-kbd>Space</ce-kbd>
</div>

<!-- @example Inline inside a sentence -->
<p>Use <ce-kbd>J</ce-kbd> / <ce-kbd>K</ce-kbd> to navigate the list.</p>
