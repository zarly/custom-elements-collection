<!-- @example Labelled text input with help -->
<ce-input
  label="Display name"
  name="display_name"
  placeholder="Ada Lovelace"
  help="Shown next to your comments."
></ce-input>

<!-- @example Required email with validation pattern -->
<ce-input
  type="email"
  label="Work email"
  name="email"
  placeholder="you@company.com"
  required
></ce-input>

<!-- @example Error state — error text overrides help -->
<ce-input
  label="Username"
  name="username"
  value="ad"
  error="Must be at least 3 characters."
></ce-input>

<!-- @example Prefix + suffix slots — currency input -->
<ce-input
  type="number"
  label="Monthly budget"
  name="budget"
  value="120"
>
  <span slot="prefix">$</span>
  <span slot="suffix">/ mo</span>
</ce-input>

<!-- @example Password with help text -->
<ce-input
  type="password"
  label="Password"
  name="password"
  required
  help="At least 12 characters, including a number."
></ce-input>

<!-- @example Disabled value -->
<ce-input
  label="Plan"
  name="plan"
  value="Team — annual"
  disabled
></ce-input>
