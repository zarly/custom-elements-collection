<!-- @example Compact mixed units -->
<p>Task completed in <ce-duration seconds="3725"></ce-duration>.</p>

<!-- @example Full granular output -->
<p>Build pipeline: <ce-duration seconds="3725" units="3"></ce-duration>.</p>

<!-- @example Long word form with plural agreement -->
<p>Total session: <ce-duration seconds="3725" units="3" format="long"></ce-duration>.</p>

<!-- @example Large multi-day duration -->
<p>Uptime: <ce-duration seconds="190800" units="2"></ce-duration>.</p>

<!-- @example Sub-second rendering -->
<p>Latency: <ce-duration ms="250"></ce-duration>.</p>
