<!-- @example Language vocabulary -->
<lesson-vocab
  term="ephemeral"
  phonetic="/ɪˈfem.ər.əl/"
  pos="adj"
  level="C1"
  definition="Lasting for a very short time; transitory."
  example="The ephemeral nature of social-media trends makes long-term planning difficult."
></lesson-vocab>

<!-- @example Technical term -->
<lesson-vocab
  term="idempotent"
  pos="adj"
  definition="Denoting an operation that produces the same result if applied multiple times as it does when applied once."
  example="HTTP GET is idempotent; HTTP POST is not."
></lesson-vocab>

<!-- @example Minimal (term + definition only) -->
<lesson-vocab
  term="retrieval practice"
  definition="The act of actively recalling information from memory, which strengthens the memory trace more than passive review."
></lesson-vocab>
