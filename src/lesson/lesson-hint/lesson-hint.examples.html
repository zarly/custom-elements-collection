<!-- @example Three-step debugging hints -->
<lesson-hint
  hints='["Read the error message carefully — it often names the file and line number.","Check whether the variable is defined in scope at the point where it is used.","Add a console.log just before the failing line to inspect actual values."]'
></lesson-hint>

<!-- @example Two-hint nudge for a math problem -->
<lesson-hint
  hints='["Try rewriting the expression so that all terms with x are on the same side.","Once isolated, divide both sides by the coefficient of x to get x by itself."]'
></lesson-hint>

<!-- @example Single hint -->
<lesson-hint
  hints='["The answer involves Newtons (kg·m/s²), not just kilograms — keep the units consistent."]'
></lesson-hint>
