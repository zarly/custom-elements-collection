<!-- @example Learning style myth -->
<lesson-myth
  myth="People learn best when taught in their preferred learning style (visual, auditory, kinaesthetic)."
  truth="The 'learning styles' hypothesis has been empirically falsified. Pashler et al. 2008 found no evidence that matching instruction to a learner's style improves outcomes."
  explanation="The meshing hypothesis (teach in the learner's preferred style) was tested and failed to replicate. Treat any curriculum segmented by VARK as broken by design."
></lesson-myth>

<!-- @example Memory myth -->
<lesson-myth
  myth="We only use 10% of our brain."
  truth="Brain imaging shows that we use virtually all of our brain, and most of the brain is active almost all the time."
></lesson-myth>

<!-- @example Practice myth -->
<lesson-myth
  myth="10,000 hours of practice will make you an expert at anything."
  truth="Ericsson (who the rule is based on) explicitly disowned the 10,000-hour figure. What matters is deliberate, feedback-rich, weakness-targeted practice — not just hours."
></lesson-myth>
